<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if object %}Edit Album{% else %}New Album{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .form-container {
            max-width: 500px;
            margin: 80px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .btn-custom { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4 text-primary">
            {% if object %}Edit Album{% else %}Create Your Album{% endif %}
        </h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                {% for field in form %}
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endfor %}
            </div>

            <button type="submit" class="btn btn-primary btn-custom">Save Album</button>
            <a href="{% url 'album_list' %}" class="btn btn-outline-secondary btn-custom">Cancel</a>
        </form>
    </div>
</div>

<script>
    document.querySelectorAll('input, textarea').forEach(element => {
        element.classList.add('form-control');
    });
</script>

</body>
</html>
