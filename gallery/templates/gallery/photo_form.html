<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Asset</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #333; margin-top: 0; margin-bottom: 25px; text-align: center; }
        
        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        
        /* Button */
        button { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #218838; }

        /* Success/Error Styling */
        .success-box { background: #d4edda; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Upload Asset</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="success-box">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
            </div>
        {% endfor %}

        <button type="submit">Begin Cloud Upload</button>
        
       <a href="{% url 'album_detail' album.pk %}" class="btn-cancel">Cancel</a>
    </form>

    <style>
        .btn-cancel { 
            display: block; width: 100%; padding: 14px; margin-top: 10px;
            background: #6c757d; color: white; text-align: center;
            text-decoration: none; border-radius: 6px; font-weight: bold;
            box-sizing: border-box;
        }
        .btn-cancel:hover { background: #5a6268; }
    </style>
</div>

</body>
</html>
